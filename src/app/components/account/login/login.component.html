<!--Página de login com Bootstrap-->
<div class="row">
    <div class="col-md-4 offset-md-4"> <!-- offset-md-4 serve para centralizar o card, o 4 é o tamanho do card, o bootstrap divide a tela em 12 partes -->
        <div class="card mt-4"> <!-- mt-3 serve para dar um espaçamento entre o card e o topo da tela, e o card é o container do conteúdo -->
            <div class="card-body shadow-lg"> <!-- card-body é o corpo do card -->
                <div class="text-center"> <!-- text-center serve para centralizar o conteúdo -->
                    <h2>Acessar Agenda</h2>
                    <p>Entre com suas credencias de usuário.</p>
                </div>
                <form>
                    <div class="mb-3">
                        <label>Email de acesso:</label>
                        <input type="email" class="form-control" placeholder="Digite seu email aqui."> <!-- form-control1 é uma classe do bootstrap para estilizar o input -->
                    </div>
                    <div class="mb-2">
                        <label>Senha de acesso:</label>
                        <input type="password" class="form-control" placeholder="Digite sua senha aqui">
                        <div class="text-end">
                            <!-- Vamos criar um botão para redirecionar para a página de recuperação de senha-->
                            <a [routerLink]="['/account/forgot-password']">
                                Esqueci minha senha!
                            </a>
                        </div>
                    </div>
                    <div class="mb-2 d-grid">
                        <button type="submit" class="btn btn-primary">
                            Entrar
                        </button>
                    </div>
                    <div class="mb-2 d-grid">
                        <a [routerLink]="['/account/register']" class="btn btn-light">
                            Não possui conta? <strong>Registrar agora.</strong>
                        </a>
                    </div>    
                </form>
            </div>
        </div>
    </div>
</div>
